# MS SQL Database
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=kitchenmanager_db;encrypt=true;trustServerCertificate=true;
spring.datasource.username=kitchen_user
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# SQL init
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false

# JWT
jwt.secret=mySuperSecretKeyForJwtTokenGenerationThatIsLongEnoughForHS512Algorithm1234567890abcdef
jwt.expiration=86400000

# Session
server.servlet.session.timeout=24h
server.servlet.session.cookie.max-age=24h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=COOKIE
