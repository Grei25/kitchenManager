<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои доставки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-info">
    <div class="container">
        <a class="navbar-brand" href="#">🍽️ Goulash Clone - Курьер</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/courier/orders">Доступные</a>
            <a class="nav-link active" href="/courier/my-deliveries">Мои доставки</a>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Мои активные доставки</h2>
    <div class="row" th:if="${not #lists.isEmpty(deliveringOrders)}">
        <div class="col-md-6 mb-4" th:each="order : ${deliveringOrders}">
            <div class="card border-primary">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Заказ #<span th:text="${order.id}">1</span></h5>
                </div>
                <div class="card-body">
                    <p><strong>Клиент:</strong> <span th:text="${order.clientName}">Иван</span></p>
                    <p><strong>Телефон:</strong> <span th:text="${order.clientPhone}">+7...</span></p>
                    <p><strong>Адрес:</strong> <span th:text="${order.address}">ул. Пушкина</span></p>
                    <p><strong>Сумма:</strong> <span th:text="${order.totalAmount} + ' ₽'">1000 ₽</span></p>

                    <form th:action="@{'/courier/order/' + ${order.id} + '/delivered'}" method="post">
                        <button type="submit" class="btn btn-success w-100">
                            ✅ Доставлено
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(deliveringOrders)}" class="alert alert-info">
        У вас нет активных доставок
    </div>

    <h2 class="mb-4 mt-4">История доставок</h2>
    <!-- Здесь можно добавить историю -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Автообновление страницы каждые 15 секунд -->
<script>
    // Перезагрузка страницы каждые 15 секунд для актуальных данных
    setInterval(function () {
        location.reload();
    }, 15000);
</script>
</body>
</html>
