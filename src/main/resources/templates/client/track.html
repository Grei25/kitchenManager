<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отслеживание заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-line {
            display: flex;
            justify-content: space-between;
            margin: 40px 0;
            position: relative;
        }
        .status-item {
            text-align: center;
            flex: 1;
        }
        .status-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
        }
        .status-icon.completed {
            background: #28a745;
            color: white;
        }
        .status-icon.current {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand" href="/client/menu">🍽️ Goulash Clone</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Заказ #<span th:text="${order.id}">1</span></h4>
        </div>
        <div class="card-body">
            <div class="status-line">
                <div class="status-item"
                     th:classappend="${order.status.name() == 'NEW' or order.status.name() == 'CONFIRMED' or order.status.name() == 'COOKING' or order.status.name() == 'READY' or order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'} ? 'completed' : ''">
                    <div class="status-icon">📝</div>
                    <div>Принят</div>
                </div>
                <div class="status-item"
                     th:classappend="${order.status.name() == 'CONFIRMED' or order.status.name() == 'COOKING' or order.status.name() == 'READY' or order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'} ? 'completed' : ''">
                    <div class="status-icon">✅</div>
                    <div>Подтвержден</div>
                </div>
                <div class="status-item"
                     th:classappend="${order.status.name() == 'COOKING' or order.status.name() == 'READY' or order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'} ? 'completed' : ''">
                    <div class="status-icon">👨‍🍳</div>
                    <div>Готовится</div>
                </div>
                <div class="status-item"
                     th:classappend="${order.status.name() == 'READY' or order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'} ? 'completed' : ''">
                    <div class="status-icon">✅</div>
                    <div>Готов</div>
                </div>
                <div class="status-item"
                     th:classappend="${order.status.name() == 'DELIVERING' or order.status.name() == 'DELIVERED'} ? 'completed' : ''">
                    <div class="status-icon">🛵</div>
                    <div>В доставке</div>
                </div>
                <div class="status-item"
                     th:classappend="${order.status.name() == 'DELIVERED'} ? 'completed' : ''">
                    <div class="status-icon">🏠</div>
                    <div>Доставлен</div>
                </div>
            </div>

            <hr>

            <div class="row mt-4">
                <div class="col-md-6">
                    <h5>Детали заказа</h5>
                    <p><strong>Имя:</strong> <span th:text="${order.clientName}">Иван</span></p>
                    <p><strong>Телефон:</strong> <span th:text="${order.clientPhone}">+7...</span></p>
                    <p><strong>Адрес:</strong> <span th:text="${order.address}">ул. Пушкина</span></p>
                    <p><strong>Статус:</strong>
                        <span class="badge bg-primary" th:text="${order.status}">NEW</span>
                    </p>
                </div>
                <div class="col-md-6">
                    <h5>Состав заказа</h5>
                    <table class="table table-sm">
                        <thead>
                        <tr>
                            <th>Блюдо</th>
                            <th>Кол-во</th>
                            <th>Цена</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${order.items}">
                            <td th:text="${item.dish.name}">Пицца</td>
                            <td th:text="${item.quantity}">1</td>
                            <td th:text="${item.price} + ' ₽'">500 ₽</td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr>
                            <th colspan="2" class="text-end">Итого:</th>
                            <th th:text="${order.totalAmount} + ' ₽'">1000 ₽</th>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/client/menu" class="btn btn-danger">Сделать новый заказ</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
