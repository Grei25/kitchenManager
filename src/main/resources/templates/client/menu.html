<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Меню ресторана</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/menu-inline.css">
</head>
<body>
<nav class="navbar navbar-custom">
    <div class="container">
        <a class="brand-logo" href="/client/menu"><i class="bi bi-egg-fried"></i> Goulash Clone</a>
        <div class="d-flex align-items-center">
            <div class="cart-widget">
                <i class="bi bi-cart3 fs-4" style="color: var(--primary-color);"></i>
                <span class="cart-count badge bg-danger" id="cartCount">0</span>
                <a href="/client/checkout" class="btn btn-outline-danger btn-sm ms-2">Оформить</a>
            </div>
        </div>
    </div>
</nav>

<div class="hero-section">
    <div class="container">
        <h1><i class="bi bi-egg-fried"></i> Добро пожаловать!</h1>
        <p class="lead">Лучшие блюда с доставкой на дом</p>
    </div>
</div>

<div class="container">
    <div class="category-nav">
        <a class="category-btn" th:classappend="${selectedCategory == 'all' or selectedCategory == null} ? 'active' : ''" th:href="@{/client/menu(page=0, category='all')}">Все</a>
        <a class="category-btn" th:classappend="${selectedCategory == 'Пицца'} ? 'active' : ''" th:href="@{/client/menu(page=0, category='Пицца')}">🍕 Пицца</a>
        <a class="category-btn" th:classappend="${selectedCategory == 'Супы'} ? 'active' : ''" th:href="@{/client/menu(page=0, category='Супы')}">🍜 Супы</a>
        <a class="category-btn" th:classappend="${selectedCategory == 'Салаты'} ? 'active' : ''" th:href="@{/client/menu(page=0, category='Салаты')}">🥗 Салаты</a>
        <a class="category-btn" th:classappend="${selectedCategory == 'Горячее'} ? 'active' : ''" th:href="@{/client/menu(page=0, category='Горячее')}">🍝 Горячее</a>
        <a class="category-btn" th:classappend="${selectedCategory == 'Напитки'} ? 'active' : ''" th:href="@{/client/menu(page=0, category='Напитки')}">🥤 Напитки</a>
        <a class="category-btn" th:classappend="${selectedCategory == 'Десерты'} ? 'active' : ''" th:href="@{/client/menu(page=0, category='Десерты')}">🍰 Десерты</a>
    </div>

    <div class="text-center mb-3">
        <span class="text-muted" th:if="${dishPage.totalElements > 0}">
            Показано <span th:text="${dishes.size()}">0</span> из <span th:text="${dishPage.totalElements}">0</span> блюд
        </span>
    </div>

    <div class="row">
        <div th:each="dish : ${dishes}" class="col-lg-4 col-md-6 mb-4">
            <div class="dish-card">
                <div class="dish-image">
                    <img th:if="${dish.imageUrl != null}" th:src="${dish.imageUrl}" th:alt="${dish.name}" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="dish-body">
                    <h3 class="dish-title" th:text="${dish.name}">Название</h3>
                    <p class="dish-description" th:text="${dish.description}">Описание</p>
                    <span class="badge bg-secondary" th:text="${dish.category}">Категория</span>
                </div>
                <div class="dish-footer">
                    <span class="dish-price" th:text="'₽ ' + ${dish.price}">₽ 450</span>
                    <button type="button" class="add-to-cart-btn btn btn-primary btn-sm" th:data-dish-id="${dish.id}" onclick="addToCart(this)">
                        <i class="bi bi-cart-plus"></i> В корзину
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(dishes)}" class="text-center py-5">
        <i class="bi bi-egg-fried display-1 text-muted"></i>
        <h3 class="text-muted mt-3">В этой категории пока нет блюд</h3>
    </div>

    <nav th:if="${totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/client/menu(page=${currentPage - 1}, category=${selectedCategory})}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active' : ''">
                <a class="page-link" th:href="@{/client/menu(page=${i}, category=${selectedCategory})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/client/menu(page=${currentPage + 1}, category=${selectedCategory})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="cartToast" class="toast hide" role="alert">
        <div class="toast-header bg-success text-white">
            <i class="bi bi-check-circle me-2"></i>
            <strong class="me-auto">Успешно</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toastMessage">Блюдо добавлено в корзину!</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/menu-cart.js"></script>
</body>
</html>
