<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Меню ресторана</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/menu.css">
</head>
<body>
<nav class="navbar navbar-custom">
    <div class="container">
        <a class="brand-logo" href="/client/menu">
            <i class="bi bi-egg-fried"></i> Goulash Clone
        </a>

        <div class="d-flex align-items-center">
            <div class="cart-widget">
                <i class="bi bi-cart3 fs-4" style="color: var(--primary-color);"></i>
                <span class="cart-count" th:text="${#maps.size(cart)}">0</span>
                <a href="/client/checkout" class="btn btn-outline-danger btn-sm ms-2">
                    Оформить
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Hero секция -->
<div class="hero-section">
    <div class="container">
        <h1><i class="bi bi-egg-fried"></i> Добро пожаловать!</h1>
        <p class="lead">Лучшие блюда с доставкой на дом</p>
    </div>
</div>

<div class="container">
    <!-- Категории -->
    <div class="category-nav">
        <button class="category-btn active" onclick="filterDishes('all')">Все</button>
        <button class="category-btn" onclick="filterDishes('Пицца')">🍕 Пицца</button>
        <button class="category-btn" onclick="filterDishes('Супы')">🍜 Супы</button>
        <button class="category-btn" onclick="filterDishes('Салаты')">🥗 Салаты</button>
        <button class="category-btn" onclick="filterDishes('Горячее')">🍝 Горячее</button>
        <button class="category-btn" onclick="filterDishes('Напитки')">🥤 Напитки</button>
        <button class="category-btn" onclick="filterDishes('Десерты')">🍰 Десерты</button>
    </div>

    <!-- Меню с блюдами -->
    <div class="row" id="menu-container">
        <div th:each="dish : ${dishes}"
             class="col-lg-4 col-md-6 mb-4"
             th:attr="data-category=${dish.category}">
            <div class="dish-card">
                <div class="dish-image">
                    <img th:if="${dish.imageUrl != null}"
                         th:src="${dish.imageUrl}"
                         th:alt="${dish.name}"
                         style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="dish-body">
                    <h3 class="dish-title" th:text="${dish.name}">Название блюда</h3>
                    <p class="dish-description" th:text="${dish.description}">Описание блюда</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-secondary" th:text="${dish.category}">Категория</span>
                    </div>
                </div>
                <div class="dish-footer">
                    <span class="dish-price" th:text="'₽ ' + ${dish.price}">₽ 450</span>
                    <form th:action="@{'/client/cart/add/' + ${dish.id}}" method="post" style="margin: 0;">
                        <button type="submit" class="add-to-cart-btn">
                            <i class="bi bi-cart-plus"></i> Добавить
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Сообщение о пустой корзине -->
    <div th:if="${#maps.isEmpty(cart)}" class="empty-cart-message">
        <i class="bi bi-cart-x"></i>
        <p class="mt-3">Ваша корзина пуста. Добавьте блюда из меню!</p>
    </div>
</div>

<!-- Тост-уведомление (будет показываться при добавлении в корзину) -->
<div class="toast-notification">
    <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-check-circle"></i> Блюдо добавлено в корзину!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript для фильтрации и уведомлений -->
<script>
    // Фильтрация блюд по категориям
    function filterDishes(category) {
        const dishes = document.querySelectorAll('[data-category]');
        const buttons = document.querySelectorAll('.category-btn');

        // Обновляем активную кнопку
        buttons.forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.includes(category === 'all' ? 'Все' : category)) {
                btn.classList.add('active');
            }
        });

        // Фильтруем блюда
        dishes.forEach(dish => {
            if (category === 'all' || dish.dataset.category === category) {
                dish.style.display = 'block';
                // Добавляем анимацию появления
                dish.style.animation = 'fadeInUp 0.5s ease';
            } else {
                dish.style.display = 'none';
            }
        });
    }

    // Показываем тост при добавлении в корзину
    document.addEventListener('DOMContentLoaded', function() {
        const addToCartForms = document.querySelectorAll('.add-to-cart-btn');
        const toast = new bootstrap.Toast(document.getElementById('successToast'));

        addToCartForms.forEach(form => {
            form.addEventListener('click', function(e) {
                // Показываем уведомление
                toast.show();

                // Анимируем корзину
                const cartIcon = document.querySelector('.cart-widget');
                cartIcon.classList.add('pulse');
                setTimeout(() => {
                    cartIcon.classList.remove('pulse');
                }, 1000);
            });
        });
    });

    // Поиск по меню (можно добавить позже)
    function searchDishes() {
        const searchInput = document.getElementById('searchInput').value.toLowerCase();
        const dishes = document.querySelectorAll('[data-category]');

        dishes.forEach(dish => {
            const title = dish.querySelector('.dish-title').textContent.toLowerCase();
            const description = dish.querySelector('.dish-description').textContent.toLowerCase();

            if (title.includes(searchInput) || description.includes(searchInput)) {
                dish.style.display = 'block';
            } else {
                dish.style.display = 'none';
            }
        });
    }

    // Сортировка по цене
    function sortByPrice(order) {
        const container = document.getElementById('menu-container');
        const dishes = Array.from(document.querySelectorAll('[data-category]'));

        dishes.sort((a, b) => {
            const priceA = parseFloat(a.querySelector('.dish-price').textContent.replace('₽', ''));
            const priceB = parseFloat(b.querySelector('.dish-price').textContent.replace('₽', ''));

            return order === 'asc' ? priceA - priceB : priceB - priceA;
        });

        // Перестраиваем DOM
        dishes.forEach(dish => container.appendChild(dish));
    }

    // Обновление количества в корзине (если нужно)
    function updateCartCount() {
        fetch('/client/cart/count')
            .then(response => response.json())
            .then(count => {
                document.querySelector('.cart-count').textContent = count;
            });
    }
</script>
</body>
</html>
