<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Оформление заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand" href="/client/menu">🍽️ Goulash Clone</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/client/menu">← Назад в меню</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">Оформление заказа</h1>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">Ваш заказ</h5>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Блюдо</th>
                            <th>Количество</th>
                            <th>Цена</th>
                            <th>Сумма</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="dish : ${cartDishes}">
                            <td th:text="${dish.name}">Пицца</td>
                            <td th:text="${cart.get(dish.id)}">1</td>
                            <td th:text="${dish.price} + ' ₽'">500 ₽</td>
                            <td th:text="${dish.price * cart.get(dish.id)} + ' ₽'">500 ₽</td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr>
                            <th colspan="3" class="text-end">Итого:</th>
                            <th class="text-danger" th:text="${total} + ' ₽'">1000 ₽</th>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">Данные для доставки</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/client/order/create}" method="post">
                        <div class="mb-3">
                            <label for="clientName" class="form-label">Ваше имя *</label>
                            <input type="text" class="form-control" id="clientName" name="clientName" required>
                        </div>

                        <div class="mb-3">
                            <label for="clientPhone" class="form-label">Телефон *</label>
                            <input type="tel" class="form-control" id="clientPhone" name="clientPhone"
                                   placeholder="+7 (999) 123-45-67" required>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Адрес доставки *</label>
                            <textarea class="form-control" id="address" name="address" rows="2" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="comment" class="form-label">Комментарий к заказу</label>
                            <textarea class="form-control" id="comment" name="comment" rows="2"></textarea>
                        </div>

                        <button type="submit" class="btn btn-danger w-100">
                            Подтвердить заказ
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
