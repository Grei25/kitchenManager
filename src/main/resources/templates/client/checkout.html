<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Оформление заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>
<div class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="brand-logo" href="/client/menu"><i class="bi bi-egg-fried"></i> Goulash Clone</a>
        <a href="/client/menu" class="btn-back"><i class="bi bi-arrow-left"></i> Назад в меню</a>
    </div>
</div>

<div class="container">
    <div th:if="${#lists.isEmpty(cartDishes)}" class="alert-warning">
        <i class="bi bi-cart-x fs-3"></i>
        <p class="mt-2 mb-0">Ваша корзина пуста!</p>
        <a href="/client/menu" class="btn btn-sm btn-outline-secondary mt-2">Вернуться в меню</a>
    </div>

    <div th:unless="${#lists.isEmpty(cartDishes)}">
        <div class="checkout-card">
            <div class="row g-0">
                <div class="col-md-7">
                    <div class="order-summary">
                        <h4 class="section-title"><i class="bi bi-basket"></i> Ваш заказ</h4>
                        <div class="table-responsive">
                            <table class="table-custom">
                                <thead><tr><th>Блюдо</th><th class="text-center">Кол-во</th><th class="text-end">Цена</th><th class="text-end">Сумма</th></tr></thead>
                                <tbody>
                                <tr th:each="dish : ${cartDishes}">
                                    <td th:text="${dish.name}">Пицца</td>
                                    <td class="text-center" th:text="${cart.get(dish.id)}">1</td>
                                    <td class="text-end" th:text="${dish.price} + ' ₽'">500 ₽</td>
                                    <td class="text-end" th:text="${dish.price * cart.get(dish.id)} + ' ₽'">500 ₽</td>
                                </tr>
                                </tbody>
                                <tfoot><tr style="border-top:1px solid #eaeaea"><td colspan="3" class="text-end fw-bold">Итого:</td><td class="text-end total-price" th:text="${total} + ' ₽'">1000 ₽</td></tr></tfoot>
                            </table>
                        </div>
                        <div class="divider"></div>
                        <a href="/client/menu" class="btn-back d-block text-center"><i class="bi bi-pencil"></i> Добавить ещё блюда</a>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="form-section">
                        <h4 class="section-title"><i class="bi bi-pencil"></i> Данные для доставки</h4>
                        <form th:action="@{/client/order/create}" method="post">
                            <div class="mb-3"><label class="form-label"><i class="bi bi-person"></i> Ваше имя *</label><input type="text" class="form-control" name="clientName" required placeholder="Иван Иванов"></div>
                            <div class="mb-3"><label class="form-label"><i class="bi bi-telephone"></i> Телефон *</label><input type="tel" class="form-control" name="clientPhone" required placeholder="+7 (999) 123-45-67"></div>
                            <div class="mb-3" id="addressBlock"><label class="form-label"><i class="bi bi-geo-alt"></i> Адрес доставки *</label><textarea class="form-control" name="address" rows="2" placeholder="ул. Пушкина, д. 10, кв. 5"></textarea></div>
                            <div class="mb-3"><label class="form-label"><i class="bi bi-chat"></i> Комментарий</label><textarea class="form-control" name="comment" rows="2" placeholder="Пожелания, звонок в домофон"></textarea></div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" name="pickup" id="pickupCheck" value="true">
                                <label class="form-check-label" for="pickupCheck"><i class="bi bi-shop"></i> Самовывоз</label>
                            </div>
                            <button type="submit" class="btn-submit"><i class="bi bi-check-circle"></i> Подтвердить заказ</button>
                        </form>
                        <div class="divider"></div>
                        <form th:action="@{/client/cart/clear}" method="post"><button type="submit" class="btn-clear"><i class="bi bi-trash"></i> Очистить корзину</button></form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
