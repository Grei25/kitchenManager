<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Все заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/admin-common.css">
</head>
<body>
<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="brand-logo" href="/admin/dashboard">🍽️ Админ-панель</a>
        <div>
            <a class="btn-back me-2" href="/admin/dashboard">Дашборд</a>
            <a class="btn-back me-2" href="/admin/staff">Сотрудники</a>
            <span class="btn-back me-2" style="opacity:0.5; cursor:default;">Заказы</span>
            <a class="btn-back me-2" href="/admin/order/create">Создать заказ</a>
            <a class="btn-back me-2" sec:authorize="hasRole('SUPER_ADMIN')" href="/admin/dishes">Блюда</a>
            <a class="btn-back" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Все заказы</h2>

    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Клиент</th>
            <th>Телефон</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.clientName}">Иван</td>
            <td th:text="${order.clientPhone}">+7...</td>
            <td th:text="${order.totalAmount} + ' ₽'">1000 ₽</td>
            <td>
                <span class="badge" th:switch="${order.status}">
                    <span th:case="'NEW'" class="bg-warning" th:text="${order.status}">NEW</span>
                    <span th:case="'CONFIRMED'" class="bg-info" th:text="${order.status}">CONFIRMED</span>
                    <span th:case="'COOKING'" class="bg-primary" th:text="${order.status}">COOKING</span>
                    <span th:case="'READY'" class="bg-success" th:text="${order.status}">READY</span>
                    <span th:case="'DELIVERING'" class="bg-secondary" th:text="${order.status}">DELIVERING</span>
                    <span th:case="'DELIVERED'" class="bg-success" th:text="${order.status}">DELIVERED</span>
                    <span th:case="*" class="bg-danger" th:text="${order.status}">UNKNOWN</span>
                </span>
                <span th:if="${order.pickup == true}" class="badge bg-primary ms-1">Самовывоз</span>
            </td>
            <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</td>
            <td>
                <a th:href="@{'/client/order/' + ${order.id} + '/track'}" class="btn btn-sm btn-info">
                    Детали
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
