<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .badge {
            font-size: 0.9rem;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">🍽️ Goulash Clone - Администратор</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/admin/dashboard">Главная</a>
            <a class="nav-link" href="/admin/staff">Сотрудники</a>
            <a class="nav-link active" href="/admin/orders/all">Все заказы</a>
            <a class="nav-link" href="/admin/order/create">Создать заказ</a>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Все заказы</h2>

    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Клиент</th>
            <th>Телефон</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.clientName}">Иван</td>
            <td th:text="${order.clientPhone}">+7...</td>
            <td th:text="${order.totalAmount} + ' ₽'">1000 ₽</td>
            <td>
                <span class="badge" th:switch="${order.status}">
                    <span th:case="'NEW'" class="bg-warning" th:text="${order.status}">NEW</span>
                    <span th:case="'CONFIRMED'" class="bg-info" th:text="${order.status}">CONFIRMED</span>
                    <span th:case="'COOKING'" class="bg-primary" th:text="${order.status}">COOKING</span>
                    <span th:case="'READY'" class="bg-success" th:text="${order.status}">READY</span>
                    <span th:case="'DELIVERING'" class="bg-secondary" th:text="${order.status}">DELIVERING</span>
                    <span th:case="'DELIVERED'" class="bg-success" th:text="${order.status}">DELIVERED</span>
                    <span th:case="*" class="bg-danger" th:text="${order.status}">UNKNOWN</span>
                </span>
                <span th:if="${order.pickup == true}" class="badge bg-primary ms-1">Самовывоз</span>
            </td>
            <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</td>
            <td>
                <a th:href="@{'/client/order/' + ${order.id} + '/track'}" class="btn btn-sm btn-info">
                    Детали
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
