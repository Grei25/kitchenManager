<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">🍽️ Goulash Clone - Администратор</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/admin/dashboard">Главная</a>
            <a class="nav-link active" href="/admin/orders/all">Все заказы</a>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Все заказы</h2>

    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Клиент</th>
            <th>Телефон</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.clientName}">Иван</td>
            <td th:text="${order.clientPhone}">+7...</td>
            <td th:text="${order.totalAmount} + ' ₽'">1000 ₽</td>
            <td>
                        <span class="badge"
                              th:classappend="${order.status.name() == 'NEW'} ? 'bg-warning' :
                                             ${order.status.name() == 'CONFIRMED'} ? 'bg-info' :
                                             ${order.status.name() == 'COOKING'} ? 'bg-primary' :
                                             ${order.status.name() == 'READY'} ? 'bg-success' :
                                             ${order.status.name() == 'DELIVERING'} ? 'bg-secondary' :
                                             ${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger'"
                              th:text="${order.status}">
                            NEW
                        </span>
            </td>
            <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</td>
            <td>
                <a th:href="@{'/client/order/' + ${order.id} + '/track'}" class="btn btn-sm btn-info">
                    Детали
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
