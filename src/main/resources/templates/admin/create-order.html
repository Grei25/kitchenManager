<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Создать заказ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/admin-common.css">
</head>
<body>
<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="brand-logo" href="/admin/dashboard">🍽️ Админ-панель</a>
        <div>
            <a class="btn-back me-2" href="/admin/dashboard">Дашборд</a>
            <a class="btn-back me-2" href="/admin/staff">Сотрудники</a>
            <a class="btn-back me-2" href="/admin/orders/all">Заказы</a>
            <span class="btn-back me-2" style="opacity:0.5; cursor:default;">Создать заказ</span>
            <a class="btn-back me-2" sec:authorize="hasRole('SUPER_ADMIN')" href="/admin/dishes">Блюда</a>
            <a class="btn-back" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-plus-circle"></i> Создать заказ</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-7">
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-basket"></i> Меню блюд
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3" th:each="dish : ${dishes}">
                            <div class="card h-100">
                                <div class="card-body">
                                    <h6 th:text="${dish.name}">Блюдо</h6>
                                    <p class="text-muted small" th:text="${dish.category}">Категория</p>
                                    <p class="fw-bold" th:text="${dish.price} + ' ₽'">0 ₽</p>
                                    <div class="input-group input-group-sm">
                                        <button class="btn btn-outline-secondary" type="button" th:onclick="'decrementQty(' + ${dish.id} + ')'">-</button>
                                        <input type="number" class="form-control text-center" th:id="'qty-' + ${dish.id}" value="0" min="0" th:data-price="${dish.price}" th:data-name="${dish.name}">
                                        <button class="btn btn-outline-secondary" type="button" th:onclick="'incrementQty(' + ${dish.id} + ')'">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-cart"></i> Корзина заказа
                </div>
                <div class="card-body">
                    <ul class="list-group mb-3" id="cartList">
                        <li class="list-group-item text-muted text-center" id="emptyCart">Корзина пуста</li>
                    </ul>
                    <div class="d-flex justify-content-between fw-bold mb-3">
                        <span>Итого:</span>
                        <span id="totalPrice">0 ₽</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-person"></i> Данные клиента
                </div>
                <div class="card-body">
                    <form id="orderForm" method="post" action="/admin/order/create">
                        <div class="mb-3">
                            <label class="form-label">Имя клиента *</label>
                            <input type="text" class="form-control" name="clientName" required placeholder="Иван Иванов">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Телефон *</label>
                            <input type="tel" class="form-control" name="clientPhone" required placeholder="+7 (999) 123-45-67">
                        </div>
                        <div class="mb-3" id="addressBlock">
                            <label class="form-label">Адрес доставки</label>
                            <textarea class="form-control" name="address" rows="2" placeholder="ул. Пушкина, д. 10"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Комментарий</label>
                            <textarea class="form-control" name="comment" rows="2" placeholder="Комментарий к заказу"></textarea>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="pickup" id="pickupCheck" value="true">
                            <label class="form-check-label" for="pickupCheck"><i class="bi bi-shop"></i> Самовывоз</label>
                        </div>
                        <input type="hidden" name="cartData" id="cartData">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle"></i> Создать заказ
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/create-order.js"></script>
</body>
</html>
