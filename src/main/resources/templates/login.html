<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - KitchenManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="bi bi-egg-fried fs-1"></i>
        <h3 class="mt-2 mb-0">KitchenManager</h3>
        <p class="mb-0 mt-1 opacity-75">Система управления</p>
    </div>

    <div class="login-body">
        <div th:if="${param.error}" class="error-message">
            <i class="bi bi-exclamation-triangle"></i> Неверный логин или пароль
        </div>

        <div th:if="${param.logout}" class="success-message">
            <i class="bi bi-check-circle"></i> Вы успешно вышли из системы
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person"></i> Логин
                </label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Введите логин" required autofocus autocomplete="username">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="bi bi-lock"></i> Пароль
                </label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Введите пароль" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-login w-100">
                Войти
            </button>
        </form>

        <div class="role-badges mt-3">
            <small class="text-muted">
                Тест: superadmin/super123 • admin/admin123 • cook/cook123 • courier/courier123
            </small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
