<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Goulash Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #5a4e3e 0%, #3d3229 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-body {
            padding: 40px 30px;
        }
        .form-control:focus {
            border-color: #5a4e3e;
            box-shadow: 0 0 0 0.2rem rgba(90, 78, 62, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #5a4e3e 0%, #3d3229 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #6d5e4d 0%, #4d4239 100%);
            color: white;
        }
        .role-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
            justify-content: center;
        }
        .role-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #f5f0e8;
            color: #5a4e3e;
        }
        .error-message {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .logout-message {
            color: #198754;
            background: #d1e7dd;
            border: 1px solid #badbcc;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="bi bi-egg-fried fs-1"></i>
        <h3 class="mt-2 mb-0">Goulash Clone</h3>
        <p class="mb-0 mt-1 opacity-75">Система управления</p>
    </div>

    <div class="login-body">
        <div th:if="${param.error}" class="error-message">
            <i class="bi bi-exclamation-triangle"></i> Неверный логин или пароль
        </div>

        <div th:if="${param.logout}" class="logout-message">
            <i class="bi bi-check-circle"></i> Вы успешно вышли из системы
        </div>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person"></i> Логин
                </label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Введите логин" required autofocus>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="bi bi-lock"></i> Пароль
                </label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="btn btn-login w-100">
                Войти
            </button>
        </form>

        <div class="role-badges">
            <span class="role-badge">superadmin / super123</span>
            <span class="role-badge">admin / admin123</span>
            <span class="role-badge">cook / cook123</span>
            <span class="role-badge">courier / courier123</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
