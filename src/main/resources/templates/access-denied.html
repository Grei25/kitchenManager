<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ запрещён - Goulash Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .error-header {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            color: white;
            padding: 40px 30px;
        }
        .error-body {
            padding: 30px;
        }
        .btn-back {
            background: linear-gradient(135deg, #5a4e3e 0%, #3d3229 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background: linear-gradient(135deg, #6d5e4d 0%, #4d4239 100%);
            color: white;
        }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-header">
        <i class="bi bi-shield-x fs-1"></i>
        <h1 class="mt-3 mb-0">403</h1>
        <p class="mb-0 opacity-75">Доступ запрещён</p>
    </div>
    <div class="error-body">
        <p class="text-muted">У вас нет прав для доступа к этой странице.</p>
        <p class="small text-muted">Войдите под другой учётной записью с нужными правами.</p>
        <a href="/login" class="btn-back">
            <i class="bi bi-box-arrow-in-right"></i> Войти
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
